<!--
  This template is compiled ahead-of-time into JavaScript render
  functions — it is NOT parsed as HTML in the browser at runtime. That is
  what unlocks the Angular-only syntax below ({{ }}, (event), @if, …).
-->

<section class="card">
  <!--
    Interpolation `{{ }}`: Angular calls `title()` (signals are functions
    you invoke to read their current value) every change-detection pass
    and stitches the result into the text node. It is automatically
    HTML-escaped, so this is safe against injection even if `title` came
    from user input.
  -->
  <h1>Welcome, {{ title() }}!</h1>
  <p>This card mixes HTML structure with CSS styling.</p>

  <!--
    Event binding `(click)="…"`: the string is a template expression, not
    raw JS — it runs in the component's context, so `increment()` resolves
    to `this.increment()` on the `App` class. Angular schedules a
    change-detection pass right after it runs, which is why the
    interpolations below update without any manual "re-render" call.
  -->
  <button type="button" (click)="increment()">Learn more</button>

  <!--
    `@if` is the modern (v17+) control-flow block — a direct replacement
    for the structural directive `*ngIf`. Unlike `*ngIf`, the content
    inside is fully removed/added to the DOM (not just visually hidden),
    and it needs no `CommonModule` import: it's built into the compiler.
  -->
  @if (hasBeenClicked()) {
    <p class="card__hint">
      Clicked {{ clicks() }} time{{ clicks() === 1 ? '' : 's' }} — the
      paragraph above only exists in the DOM while this condition is true.
    </p>
  }
</section>

<!--
  Primary navigation. `routerLink` (a directive, not a real `href`) tells
  the Router to intercept the click and swap `<router-outlet>`'s content
  via `pushState` instead of letting the browser do a full page reload —
  the plain string form here (`routerLink="/cards"`) is sugar for the
  array form `[routerLink]="['/cards']"`, both compiled the same way.

  `routerLinkActive` watches the CURRENT url and toggles the given
  class(es) on this element whenever its own `routerLink` target is (a
  prefix of) that url — no manual "which page am I on" state anywhere in
  this component. `[routerLinkActiveOptions]="{ exact: true }"` narrows
  that match so a link to `/` isn't permanently "active" once it also
  matches every deeper route.
-->
<nav class="app-nav" aria-label="Primary">
  <a
    routerLink="/cards"
    routerLinkActive="app-nav__link--active"
    [routerLinkActiveOptions]="{ exact: true }"
    class="app-nav__link"
  >Signals &amp; Control Flow</a>
  <a
    routerLink="/box-model"
    routerLinkActive="app-nav__link--active"
    [routerLinkActiveOptions]="{ exact: true }"
    class="app-nav__link"
  >Box Model</a>
  <a
    routerLink="/flow-art"
    routerLinkActive="app-nav__link--active"
    [routerLinkActiveOptions]="{ exact: true }"
    class="app-nav__link"
  >Flow Art</a>
</nav>

<!--
  Every feature (CardList, BoxModel, FlowArt) is now a routed page rather
  than three components rendered side by side — `<router-outlet>` is
  where the Router mounts whichever one matches the current URL, tearing
  the previous one down first. Each feature's own lazy chunk (see
  app-routing-module.ts's `loadChildren`) is fetched on first visit only.
-->
<router-outlet></router-outlet>
